<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>Fitness Lanka | Premium Fitness & Gym in Colombo</title>

  <!-- Favicon -->
  <link rel='icon' type='image/svg+xml' href='/ardent-logo.svg' />
  <meta name="description"
    content="Elevate your fitness journey at Fitness Lanka, Colombo's premier gym. State-of-the-art equipment, elite personal trainers, and high-energy HIIT classes." />
  <link rel="canonical" href="https://fitnesslanka.com" />

  <!-- Preloads for LCP -->
  <link rel="preload" as="image"
    href="https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=75&w=1920&auto=format&fit=crop&fm=webp"
    fetchpriority="high" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Oswald:wght@700&family=Barlow+Condensed:wght@800&family=Fraunces:ital,wght@0,700;1,200&family=Sora:wght@300&display=swap"
    rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            heading: ['Oswald', 'sans-serif'],
          },
          colors: {
            neon: {
              orange: '#FF9E80', /* Light Luminous Coral */
              blue: '#00F0FF',
              dark: '#050505',
              card: 'rgba(20, 20, 20, 0.4)',
              glass: 'rgba(255, 255, 255, 0.03)'
            }
          },
          animation: {
            'float': 'float 8s ease-in-out infinite',
            'blob': 'blob 15s infinite',
            'liquid': 'liquid 15s ease-in-out infinite',
            'shimmer': 'shimmer 2s linear infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-10px)' },
            },
            blob: {
              '0%': { transform: 'translate(0px, 0px) scale(1)' },
              '33%': { transform: 'translate(20px, -30px) scale(1.05)' },
              '66%': { transform: 'translate(-10px, 10px) scale(0.95)' },
              '100%': { transform: 'translate(0px, 0px) scale(1)' },
            },
            liquid: {
              '0%, 100%': { borderRadius: '60% 40% 30% 70% / 60% 30% 70% 40%' },
              '50%': { borderRadius: '30% 60% 70% 40% / 50% 60% 30% 60%' },
            },
            shimmer: {
              '0%': { transform: 'translateX(-100%)' },
              '100%': { transform: 'translateX(100%)' }
            }
          }
        }
      }
    }
  </script>
  <style>
    /* Reset and Base Styles */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }

      .reveal {
        opacity: 1 !important;
        transform: none !important;
        filter: none !important;
      }
    }

    html {
      width: 100%;
      height: 100%;
      scroll-behavior: smooth;
      /* Native smooth scrolling for anchors */
    }

    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background-color: #020202;
      color: white;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
      /* Prevent horizontal scroll globally */
      overflow-y: auto;
      /* Ensure vertical scroll is always possible */
    }

    /* Enhanced Glassmorphism Utilities */
    .glass-panel {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      transition: all 0.4s ease;
    }

    .glass-card {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.01) 100%);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
      position: relative;
      overflow: hidden;
    }

    .glass-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      transition: 0.5s;
      pointer-events: none;
    }

    /* Hover effects only on devices that support hover (Desktop) */
    @media (hover: hover) {
      .glass-card:hover::before {
        left: 100%;
      }

      .glass-card:hover {
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.03) 100%);
        border-color: rgba(0, 240, 255, 0.3);
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 240, 255, 0.1);
        transform: translateY(-8px) scale(1.02);
      }
    }

    /* Hover underline animation */
    .hover-underline {
      position: relative;
    }

    .hover-underline::after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      bottom: -4px;
      left: 0;
      background-color: #00F0FF;
      transition: width 0.3s ease;
    }

    .hover-underline:hover::after {
      width: 100%;
    }

    /* Scroll Reveal Animations */
    .reveal {
      opacity: 0;
      transform: translateY(40px) scale(0.95);
      transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
      filter: blur(10px);
    }

    .reveal.active {
      opacity: 1;
      transform: translateY(0) scale(1);
      filter: blur(0);
    }

    /* Text Selection */
    ::selection {
      background: #00F0FF;
      color: black;
    }

    /* Hide Scrollbar but allow scroll */
    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }
  </style>
